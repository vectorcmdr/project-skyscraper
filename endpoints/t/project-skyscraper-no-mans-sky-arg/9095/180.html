-1\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\u003e\\u003C/a\u003eGetting Started\\u003C/h1\u003e\\n\u003cul\u003e\\n\u003cli\u003eBe certain you like your username as it cannot be changed after 3 days.\\u003C/li\u003e\\n\u003cli\u003eWe suggest you do the tutorials to ensure you have a grasp on the easiest ways to navigate \u0026amp; use these forums (Simply say “\u003ca class=\\\&quot;mention\\\&quot; href=\\\&quot;/u/discobot\\\&quot;\u003e@discobot\\u003C/a\u003e start new user” in a post. )\\u003C/li\u003e\\n\u003cli\u003eUse the personal menu (top right) to bookmark topics that grab your interest \u0026amp; to personalise your public profile.\\u003C/li\u003e\\n\u003cli\u003eWe strongly suggest that you not include personally identifiable information in your public profile or your username. Folks here are friendly, but it’s still the internet!\\u003C/li\u003e\\n\u003cli\u003ePlease  take a look at our \u003ca href=\\\&quot;https://forums.atlas-65.com/faq\\\&quot;\u003eFAQ/Guidelines\\u003C/a\u003e so you have a good idea of what our community is all about, and the guidelines we follow.\\u003C/li\u003e\\n\u003cli\u003eAll newcomers are invited stop by the \u003ca href=\\\&quot;https://forums.atlas-65.com/t/introduction-thread/29\\\&quot; class=\\\&quot;inline-onebox\\\&quot;\u003eIntroduction Thread\\u003C/a\u003e to say hello!\\u003C/li\u003e\\n\u003cli\u003eAdditionally, clicking on \u003ca href=\\\&quot;https://forums.atlas-65.com/latest\\\&quot;\u003eLatest\\u003C/a\u003e  off the drop-down menu should help you get up to speed with what is current \u0026amp; popular.\\u003C/li\u003e\\n\\u003C/ul\u003e\\n\u003cp\u003e\u003cstrong\u003eAs a side note,\\u003C/strong\u003e because of the origins of these forums some of the early posts in that thread might be a bit confusing. These were originally the Edison Township Amateur Radio Club forums, which is why you might see some people call it “ETARC”. After the conclusion of Season 1 of Waking Titan, they were converted to the Atlas Citizen Science Division forums you see today. You can read more about Waking Titan (and get involved!) in the \u003ca href=\\\&quot;https://forums.atlas-65.com/c/waking-titan-season-2\\\&quot;\u003eWaking Titan category\\u003C/a\u003e.\\u003C/p\u003e\\n\u003ch1\u003e\u003ca name=\\\&quot;p-64978-some-final-notes-2\\\&quot; class=\\\&quot;anchor\\\&quot; href=\\\&quot;#p-64978-some-final-notes-2\\\&quot; aria-label=\\\&quot;Heading link\\\&quot;\u003e\\u003C/a\u003eSome Final Notes\\u003C/h1\u003e\\n\u003cul\u003e\\n\u003cli\u003eTo get someone’s attention put an @ in front of their username.\\u003C/li\u003e\\n\u003cli\u003eTry checking the search option first before starting a new topic.\\u003C/li\u003e\\n\u003cli\u003eRemember to play nice: It’s what makes this community so awesome!\\u003C/li\u003e\\n\\u003C/ul\u003e\&quot;,\&quot;key\&quot;:5177,\&quot;url\&quot;:\&quot;https://forums.atlas-65.com/t/welcome-to-the-csd-forums/5177\&quot;}&quot;,&quot;customEmoji&quot;:&quot;[]&quot;,&quot;isReadOnly&quot;:&quot;false&quot;,&quot;isStaffWritesOnly&quot;:&quot;false&quot;,&quot;activatedThemes&quot;:&quot;{\&quot;6\&quot;:\&quot;Atlas\&quot;}&quot;,&quot;upcomingChanges&quot;:&quot;{\&quot;ai_bot_enable_docked_composer\&quot;:false,\&quot;chat_pinned_messages\&quot;:true,\&quot;composer_media_optimization_image_convert_enabled\&quot;:false,\&quot;dashboard_improvements\&quot;:false,\&quot;doc_categories_simple_mode\&quot;:false,\&quot;enable_ai_bot_starred_conversations\&quot;:false,\&quot;enable_discourse_reactions_by_default\&quot;:false,\&quot;enable_events_category_type_setup\&quot;:false,\&quot;enable_horizon_high_context_topic_cards\&quot;:false,\&quot;enable_ideas_category_type_setup\&quot;:true,\&quot;enable_new_checkbox_style\&quot;:true,\&quot;enable_new_defaults_for_trust_level_3_requirements\&quot;:true,\&quot;enable_new_post_reactions_menu\&quot;:true,\&quot;enable_new_post_reply_count_position\&quot;:true,\&quot;enable_simplif
