<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PS OPS CENTRE | STATUS FEED</title>
  <link rel="icon" type="image/jpeg" href="../favicon.jpg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a href="../" class="topbar-brand">
      <img src="../favicon.jpg" alt="" class="topbar-avatar"> PS/OPS
    </a>
    <span class="trace-status" id="traceStatus"></span>
    <div class="topbar-right">
      <div class="topbar-right-top">
        <span class="operator-label" id="operatorDisplay"></span>
        <span class="topbar-status" id="statusBadge">&#9679; OFFLINE</span>
      </div>
      <div class="proxy-network">
        <span class="proxy-label">PROXY NETWORK:</span>
        <a class="proxy-tag" href="https://monitor-project-skyscraper.pages.dev/" target="_blank" rel="noopener">MONITOR_PS</a>
        <a class="proxy-tag" href="https://skyscraper.havenmap.online/" target="_blank" rel="noopener">HAVEN</a>
        <a class="proxy-tag" href="https://forums.atlas-65.com/t/skyscraper-directory-organization-thread/" target="_blank" rel="noopener">ETARC/ACSD</a>
        <a class="proxy-tag" href="https://docs.google.com/spreadsheets/d/1mUOrEQqj5SqazYnwB9yjaRHICkJJVo0lJHHPSd9DbV4/edit?gid=1171087795#gid=1171087795" target="_blank" rel="noopener">YBM_CADENCE</a>
        <a class="proxy-tag" href="https://gchq.github.io/CyberChef/#recipe=Substitute('ABCDEFGHIJKLMNOPQRSTUVWXYZ','MINDFAGEBJRLHCVPQSKYUWOXTZ',true)Reverse('Line'/disabled)&input=TGYgcHdreWggaHJ5IHd1b2hreWgu&oenc=65001&ieol=CRLF" target="_blank" rel="noopener">SCHL_CODE</a>
        <a class="proxy-tag" href="https://translate.google.com/?sl=fr&tl=en&op=translate" target="_blank" rel="noopener">FR_EN</a>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab active" data-tab="feed">Change Log</button>
      <button class="tab" data-tab="manifest">Known Pages</button>
    </div>

    <!-- LEFT: Changes feed -->
    <section class="feed active" id="feed">
      <h2>&#9654; CHANGE LOG</h2>
      <div id="feedEntries"></div>
    </section>

    <!-- RIGHT: Manifest (all known pages/posts) -->
    <section class="manifest" id="manifest">
      <h2>&#9654; KNOWN PAGES</h2>
      <div class="manifest-controls">
        <input type="text" id="manifestSearch" placeholder="search title or url…" class="search-input">
        <select id="manifestFilter" class="search-input">
          <option value="all">all types</option>
          <option value="page">pages</option>
          <option value="post">posts</option>
          <option value="attachment">media</option>
        </select>
      </div>
      <div id="manifestEntries"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
