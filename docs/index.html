<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT SKYSCRAPER | OPS CENTRE</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="stylesheet" href="status/style.css">
</head>
<body class="landing">
  <main class="landing-centre">
    <img src="favicon.jpg" alt="PS" class="landing-avatar">
    <h1>PROJECT SKYSCRAPER</h1>
    <p class="tagline">SITE MONITORING &amp; OPS CENTRE</p>
    <div class="terminal-prompt" id="opPrompt" title="click to set operator name">
      <span class="prompt-sym">&#9654;</span>
      <span id="opDisplay" class="terminal-text">Awaiting External Operator ghost line...</span>
      <span class="cursor">&#9612;</span>
    </div>

    <nav class="landing-nav">
      <a href="status/" class="btn">EXEC SITE STATUS &amp; CHANGES</a>
    </nav>
    
    <footer class="landing-footer">
      <span class="blink">&#9612; LIVE &#9612;</span>
    </footer>
  </main>
  <script>
    const opDisplay = document.getElementById('opDisplay');
    const opPrompt = document.getElementById('opPrompt');
    const saved = localStorage.getItem('operator');
    if (saved) opDisplay.textContent = saved;
    opPrompt.addEventListener('click', () => {
      const current = localStorage.getItem('operator') || '';
      const name = prompt('Enter operator name:', current);
      if (name !== null) {
        const trimmed = name.trim();
        localStorage.setItem('operator', trimmed);
        opDisplay.textContent = trimmed || 'Awaiting External Operator ghost line...';
      }
    });
  </script>
</body>
</html>
