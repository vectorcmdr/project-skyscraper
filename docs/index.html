  <script>
    const inp = document.getElementById('opInput');
    const saved = localStorage.getItem('operator');
    if (saved) inp.value = saved;
    inp.addEventListener('input', () => {
      localStorage.setItem('operator', inp.value.trim());
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { location.href = 'status/'; }
    });
    inp.focus();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('miniMesh');
      if (!canvas) return;
      var ctx = canvas.getContext('2d', { alpha: true });
      var particles = [];
      var mouse = { x: -9999, y: -9999, active: false };
      var REF_DIAMETER = 320;
      var SCALE = 0.3;
      var PADDING = 0.72;
      var countEl = document.getElementById('liveCount');
      var COUNT = 54;

      var _hexR = 0;

      function init() {
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr; canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        SCALE = (Math.min(w, h) * PADDING) / REF_DIAMETER;
        _hexR = Math.min(w, h) * 0.18;
        var cx = w / 2, cy = h / 2;
        var offset = Math.PI / 6;

        for (var i = 0; i < COUNT; i++) {
          var side = Math.floor(i / (COUNT / 6));
          var t = ((i % (COUNT / 6)) / (COUNT / 6));
          var a1 = offset + side * (Math.PI / 3);
          var a2 = offset + (side + 1) * (Math.PI / 3);
          var bx = cx + (Math.cos(a1) + (Math.cos(a2) - Math.cos(a1)) * t) * hexR;
          var by = cy + (Math.sin(a1) + (Math.sin(a2) - Math.sin(a1)) * t) * hexR;

          particles.push({
            bx: bx, by: by,
            x: bx, y: by,
            size: (1.8 + Math.random() * 1.4) * SCALE,
            angle: Math.random() * Math.PI * 2,
            orbitSpeed: 0.25 + Math.random() * 0.25,
            vibeSpeed: 1.1 + Math.random() * 0.9
          });
        }
        animate();
      }

      var _S = function(v) { return v * SCALE; };

      function animate() {
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);
        ctx.shadowColor = '#ff2d2d';

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.angle += p.orbitSpeed;
          var orbitX = Math.cos(p.angle) * _S(22);
          var orbitY = Math.sin(p.angle) * _S(9);
          var vibe = Math.sin(p.angle * p.vibeSpeed) * _S(6);
          var tx = p.bx + orbitX + vibe * 0.5;
          var ty = p.by + orbitY + vibe * 0.9;

          if (mouse.active) {
            var dx = mouse.x - p.x, dy = mouse.y - p.y;
            var dist = Math.hypot(dx, dy);
            if (dist < _S(300)) {
              var force = (1 - dist / _S(300)) * 0.55;
              tx += dx * force;
              ty += dy * force;
            }
          }

          p.x += (tx - p.x) * 0.08;
          p.y += (ty - p.y) * 0.08;
        }

        ctx.lineWidth = _S(0.75);
        var connDist = _S(165);
        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var d = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
            if (d < connDist) {
              ctx.strokeStyle = 'rgba(255,45,45,' + Math.max(0, 1 - d / connDist).toFixed(3) + ')';
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        for (var k = 0; k < particles.length; k++) {
          var p = particles[k];
          var dist = Math.hypot(p.x - mouse.x, p.y - mouse.y);
          var intensity = Math.max(0, 1 - dist / _S(280));
          ctx.shadowBlur = intensity > 0.3 ? _S(24) : _S(9);
          ctx.fillStyle = '#ff2d2d';
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size + intensity * _S(3), 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.shadowBlur = 0;
        requestAnimationFrame(animate);
      }

      function updateMouse(e) {
        var r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left;
        mouse.y = e.clientY - r.top;
        mouse.active = true;
      }

      document.addEventListener('mousemove', updateMouse);
      document.addEventListener('mouseleave', function () { mouse.active = false; });
      document.addEventListener('touchmove', function (e) {
        var t = e.touches[0];
        if (t) updateMouse(t);
      });
      document.addEventListener('touchend', function () { mouse.active = false; });

      fetch('https://project-skyscraper.com/neural-network-status/')
        .then(function (r) { return r.text(); })
        .then(function (t) {
          var m = /<strong>(\d+)<\/strong>\s*Live\s+Connections/.exec(t) || /(\d+)\s+Live\s+Connections/.exec(t);
          if (m) { countEl.textContent = m[1]; }
        })
        .catch(function () {
          fetch('data/connections.json')
            .then(function (r) { return r.json(); })
            .then(function (d) { if (d && d.count !== undefined) { countEl.textContent = d.count; } })
            .catch(function () {});
        });
      init();
    })();
  </script>
