<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT SKYSCRAPER | OPS CENTRE</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="stylesheet" href="status/style.css">
</head>
<body class="landing">
  <main class="landing-centre">
    <img src="favicon.jpg" alt="PS" class="landing-avatar">
    <h1>PROJECT SKYSCRAPER</h1>
    <p class="tagline">SITE MONITORING &amp; OPS CENTRE</p>
    <div class="terminal-prompt">
      <svg class="brain-icon" viewBox="0 0 100 100" width="24" height="24" fill="none" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke">
        <path d="M50 6 C26 6 10 22 10 44 C10 58 18 70 32 78 L28 94 L42 84 L50 90 L58 84 L72 94 L68 78 C82 70 90 58 90 44 C90 22 74 6 50 6Z" stroke-width="1.8"/>
        <path d="M50 6 L50 90" stroke-width="1.5"/>
        <path d="M16 34 Q28 28 44 32" stroke-width="1.3"/>
        <path d="M12 50 Q26 44 44 48" stroke-width="1.3"/>
        <path d="M16 64 Q30 58 44 62" stroke-width="1.3"/>
        <path d="M56 32 Q72 28 84 34" stroke-width="1.3"/>
        <path d="M56 48 Q74 44 88 50" stroke-width="1.3"/>
        <path d="M56 62 Q70 58 84 64" stroke-width="1.3"/>
      </svg>
      <span class="prompt-sym">&#9654;</span>
      <span class="prompt-flavour">Awaiting External Operator ghost line...</span>
      <span class="prompt-sep">|</span>
      <span class="prompt-input-wrap">
        <input type="text" id="opInput" class="prompt-input" placeholder="callsign" maxlength="48" autocomplete="off" spellcheck="false">
        <span class="cursor">&#9612;</span>
      </span>
    </div>

    <nav class="landing-nav">
      <a href="status/" class="btn">EXEC SITE STATUS &amp; CHANGES</a>
    </nav>
    
    <footer class="landing-footer">
      <span class="blink">&#9612; LIVE &#9612;</span>
    </footer>
  </main>
  <script>
    const inp = document.getElementById('opInput');
    const saved = localStorage.getItem('operator');
    if (saved) inp.value = saved;
    inp.addEventListener('input', () => {
      localStorage.setItem('operator', inp.value.trim());
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { location.href = 'status/'; }
    });
    inp.focus();
  </script>
</body>
</html>
