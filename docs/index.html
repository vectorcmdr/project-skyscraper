<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    .neural-bg {

    .neural-count {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #fff; font-family: 'Courier New', monospace; font-weight: bold;
      font-size: 22px; text-shadow: 0 0 8px rgba(0,0,0,.8); z-index: 1;
      pointer-events: none; user-select: none;
    }
    @media (max-width: 600px) {
      .neural-bg { width: 80px; height: 80px; top: 8px; left: 8px; }
      .neural-count { font-size: 16px; }
    }

</head>
<body class="landing">
  <div class="neural-bg"><canvas id="miniMesh"></canvas><span id="liveCount" class="neural-count"></span></div>
  <main class="landing-centre">
    <img src="favicon.jpg" alt="PS" class="landing-avatar">
    <h1>PROJECT SKYSCRAPER</h1>
    <p class="tagline">SITE MONITORING &amp; OPS CENTRE</p>
    <div class="terminal-prompt">
      <svg class="brain-icon" viewBox="0 0 72 72" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
        <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" fill="none">
          <line x1="16" x2="25.875" y1="35" y2="35"/>

          <line x1="16" x2="19.75" y1="45.5" y2="45.5"/>

          <path d="M35.2997,39.4375c0-2.2455,1.2003-5.25,5.0756-5.25"/>
          <line x1="58.4583" x2="49.875" y1="34.5417" y2="34.5417"/>
          <path d="M40.375,45.5c0,0,0.1642,10.5-7.9583,10.5H16c-7.2083,0-7.6667-10.5,0-10.5C8.7917,45.5,8.3333,35,16,35 c-8.1667-7.25,1.875-13.5625,6.5-8.6875c-4.799-6.625,5.375-10.3125,8.875-5C30.9627,16,36.2222,15.0417,41.1003,19.024 l-0.4336,0.351c2.375-2.375,10.1776-1.0833,10.1776,5.3141l-2.2192,1.6234c6.8646-6.8646,14.2083,4.1875,8.5,8.2292h1.3333 c4.75,0,5.2917,10.9583-1.3333,10.9583H29.2917"/>
          <path d="M40.6667,19.375c-2.4167,2.4167-0.2822,3.1782-4.2707,7.1667"/>
        </g>
      </svg>
      <span class="prompt-sym">&#9654;</span>
      <span class="prompt-flavour">Awaiting External Operator ghost line...</span>

        <input type="text" id="opInput" class="prompt-input" placeholder="callsign" maxlength="48" autocomplete="off" spellcheck="false">
        <span class="cursor">&#9612;</span>

    <nav class="landing-nav">
      <a href="status/" class="btn">EXEC: OPS CENTRE</a>

    <footer class="landing-footer">
      <span class="blink">&#9612; LIVE &#9612;</span>
      <br/>
      <br/>
      <span class="blink">&#9612; STATUS: SUFFERING DIFFERENTIAL ANOMALIES... &#9612;</span>
    </footer>
  </main>
  <img src="img/data.gif" alt="" class="data-gif" loading="lazy">
  <script>
    const inp = document.getElementById('opInput');
    const saved = localStorage.getItem('operator');
    if (saved) inp.value = saved;
    inp.addEventListener('input', () => {
      localStorage.setItem('operator', inp.value.trim());
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { location.href = 'status/'; }
    });
    inp.focus();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('miniMesh');
      if (!canvas) return;
      var ctx = canvas.getContext('2d', { alpha: true });
      var particles = [];
      var mouse = { x: -9999, y: -9999, active: false };
      var REF_DIAMETER = 320;
      var SCALE = 0.3;
      var PADDING = 0.72;
      var PARAMS = {
        COLOR:      '#ff2d2d',
        DISTANCE:   140,
        DIST_ADD:   20,
        SIZE_MIN:   1.6,
        SIZE_ADD:   1.6,
        SPEED_MIN:  0.16,
        SPEED_ADD:  0.16,
        CONN_DIST:  170,
        LINE_W:     0.7,
        ORBIT_AMP:  6,
        SHADOW:     8,
        GLOW_SHADOW: 20,
        GLOW_THRESH: 0.25,
        GLOW_AMP:   3.2,
        COUNT:      48
      };
      var LIVE_COUNT = '';
      var countEl = document.getElementById('liveCount');

      function applyLiveParams(text) {
        var m;
        if ((m = /count\s*=\s*(\d+)/.exec(text))) { PARAMS.COUNT = parseInt(m[1]); }
        if ((m = /count\s*=\s*(\d+)/.exec(text))) { PARAMS.COUNT = parseInt(m[1]); }
        if ((m = /distance\s*=\s*([\d.]+)\s*\+\s*Math\.random\(\)\s*\*\s*([\d.]+)/.exec(text))) {
          PARAMS.DISTANCE = parseFloat(m[1]); PARAMS.DIST_ADD = parseFloat(m[2]);
        }
        if ((m = /size\s*=\s*Math\.random\(\)\s*\*\s*([\d.]+)\s*\+\s*([\d.]+)/.exec(text))) {
          PARAMS.SIZE_ADD = parseFloat(m[1]); PARAMS.SIZE_MIN = parseFloat(m[2]);
        }
        if ((m = /orbitSpeed\s*=\s*([\d.]+)\s*\+\s*Math\.random\(\)\s*\*\s*([\d.]+)/.exec(text))) {
          PARAMS.SPEED_MIN = parseFloat(m[1]); PARAMS.SPEED_ADD = parseFloat(m[2]);
        }
        if ((m = /lineWidth\s*=\s*([\d.]+)/.exec(text))) { PARAMS.LINE_W = parseFloat(m[1]); }
        if ((m = /Math\.cos\(this\.angle\)\s*\*\s*([\d.]+)/.exec(text))) { PARAMS.ORBIT_AMP = parseFloat(m[1]); }
        if ((m = /shadowBlur\s*=\s*(\d+)/g.exec(text))) {
          PARAMS.GLOW_SHADOW = parseInt(m[1]);
          if ((m = /shadowBlur\s*=\s*(\d+)/g.exec(text))) { PARAMS.SHADOW = parseInt(m[1]); }
        }
        if ((m = /intensity\s*>\s*([\d.]+)/.exec(text))) { PARAMS.GLOW_THRESH = parseFloat(m[1]); }
        if ((m = /intensity\s*\*\s*([\d.]+)/.exec(text))) { PARAMS.GLOW_AMP = parseFloat(m[1]); }
        if ((m = /d\s*<\s*([\d]+)/.exec(text))) { PARAMS.CONN_DIST = parseFloat(m[1]); }
        if ((m = /fillStyle\s*=\s*'(#[a-fA-F0-9]{6})'/.exec(text))) { PARAMS.COLOR = m[1]; }
      }

      function drawParticle(p, mouseDist) {
        var intensity = Math.max(0, 1 - mouseDist / (Math.min(canvas.offsetWidth, canvas.offsetHeight) * 0.48));
        var clr = PARAMS.COLOR;
        if (intensity > PARAMS.GLOW_THRESH) {
          ctx.fillStyle = clr;
          ctx.shadowBlur = PARAMS.GLOW_SHADOW * SCALE;
          ctx.shadowColor = clr;
        } else {
          ctx.fillStyle = clr;
          ctx.shadowBlur = PARAMS.SHADOW * SCALE;
          ctx.shadowColor = clr;
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size + intensity * PARAMS.GLOW_AMP * SCALE, 0, Math.PI * 2);
        ctx.fill();
      }

      function init() {
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        var dpr = window.devicePixelRatio || 1;
        canvas.width = w * dpr; canvas.height = h * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        SCALE = (Math.min(w, h) * PADDING) / REF_DIAMETER;

        var cx = w / 2, cy = h / 2;
        for (var i = 0; i < PARAMS.COUNT; i++) {
          var a = (Math.PI * 2 / PARAMS.COUNT) * i + (Math.random() - 0.5) * 0.35;
          var r = (PARAMS.DISTANCE * SCALE + Math.random() * PARAMS.DIST_ADD * SCALE);
          particles.push({
            bx: cx + Math.cos(a) * r,
            by: cy + Math.sin(a) * r,
            x: cx + Math.cos(a) * r,
            y: cy + Math.sin(a) * r,
            size: PARAMS.SIZE_MIN * SCALE + Math.random() * PARAMS.SIZE_ADD * SCALE,
            angle: Math.random() * Math.PI * 2,
            sp: PARAMS.SPEED_MIN + Math.random() * PARAMS.SPEED_ADD
          });
        }
        animate();
      }

      function animate() {
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.angle += p.sp;
          var tx = p.bx + Math.cos(p.angle) * PARAMS.ORBIT_AMP * SCALE;
          var ty = p.by + Math.sin(p.angle) * PARAMS.ORBIT_AMP * SCALE;

          if (mouse.active) {
            var mdx = mouse.x - p.x, mdy = mouse.y - p.y;
            var md = Math.sqrt(mdx * mdx + mdy * mdy);
            var repelR = Math.min(w, h) * 0.5;
            if (md < repelR) {
              var force = (1 - md / repelR) * 0.42;
              tx += mdx * force;
              ty += mdy * force;
            }
          }

          p.x += (tx - p.x) * 0.1;
          p.y += (ty - p.y) * 0.1;
        }

        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var d = Math.sqrt(dx * dx + dy * dy);
            var cd = PARAMS.CONN_DIST * SCALE;
            if (d < cd) {
              ctx.lineWidth = PARAMS.LINE_W * SCALE;
              ctx.strokeStyle = 'rgba(255,45,45,' + (1 - d / cd).toFixed(3) + ')';
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        for (var k = 0; k < particles.length; k++) {
          var p = particles[k];
          var mdx = p.x - mouse.x, mdy = p.y - mouse.y;
          var md = Math.sqrt(mdx * mdx + mdy * mdy);
          drawParticle(p, md);
        }

        requestAnimationFrame(animate);
      }

      function updateMouse(e) {
        var r = canvas.getBoundingClientRect();
        mouse.x = e.clientX - r.left;
        mouse.y = e.clientY - r.top;
        mouse.active = true;
      }

      document.addEventListener('mousemove', updateMouse);
      document.addEventListener('mouseleave', function () { mouse.active = false; });
      document.addEventListener('touchmove', function (e) {
        var t = e.touches[0];
        if (t) updateMouse(t);
      });
      document.addEventListener('touchend', function () { mouse.active = false; });

      fetch('https://project-skyscraper.com/neural-network-status/')
        .then(function (r) { return r.text(); })
        .then(function (t) { applyLiveParams(t); })
        .catch(function () {})
        .finally(function () { init(); });

      fetch('data/connections.json')
        .then(function (r) { return r.json(); })
        .then(function (d) { if (d && d.count) { countEl.textContent = d.count; } })
        .catch(function () {});
    })();
  </script>
</body>
</html>
