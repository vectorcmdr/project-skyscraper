<!DOCTYPE html>

        <g stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-miterlimit="10" stroke-width="2" fill="none">

          <line x1="58.4583" x2="49.875" y1="34.5417" y2="34.5417"/>
          <path d="M40.375,45.5c0,0,0.1642,10.5-7.9583,10.5H16c-7.2083,0-7.6667-10.5,0-10.5C8.7917,45.5,8.3333,35,16,35 c-8.1667-7.25,1.875-13.5625,6.5-8.6875c-4.799-6.625,5.375-10.3125,8.875-5C30.9627,16,36.2222,15.0417,41.1003,19.024 l-0.4336,0.351c2.375-2.375,10.1776-1.0833,10.1776,5.3141l-2.2192,1.6234c6.8646-6.8646,14.2083,4.1875,8.5,8.2292h1.3333 c4.75,0,5.2917,10.9583-1.3333,10.9583H29.2917"/>
          <path d="M40.6667,19.375c-2.4167,2.4167-0.2822,3.1782-4.2707,7.1667"/>

  </main>
  <img src="img/data.gif" alt="" class="data-gif" loading="lazy">
  <script>
    const inp = document.getElementById('opInput');
    const saved = localStorage.getItem('operator');
    if (saved) inp.value = saved;
    inp.addEventListener('input', () => {
      localStorage.setItem('operator', inp.value.trim());
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') { location.href = 'status/'; }
    });
    inp.focus();
  </script>
  <script>
    (function () {
      var canvas = document.getElementById('miniMesh');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var particles = [];
      var PARAMS = {
        COLOR:      '#ff2d2d',
        SIZE_MIN:   1.0,
        SIZE_MAX:   2.0,
        SPEED_MIN:  0.16,
        SPEED_ADD:  0.16,
        ORBIT_MIN:  40,
        ORBIT_ADD:  10,
        CONN_DIST:  55,
        LINE_W:     0.5,
        COUNT:      14
      };

      function applyLiveParams(text) {
        var m;
        if ((m = /size\s*=\s*Math\.random\(\)\s*\*\s*([\d.]+)\s*\+\s*([\d.]+)/.exec(text))) {
          PARAMS.SIZE_MIN = parseFloat(m[2]) * 0.6; PARAMS.SIZE_MAX = (parseFloat(m[2]) + parseFloat(m[1])) * 0.6;
        }
        if ((m = /orbitSpeed\s*=\s*([\d.]+)\s*\+\s*Math\.random\(\)\s*\*\s*([\d.]+)/.exec(text))) {
          PARAMS.SPEED_MIN = parseFloat(m[1]); PARAMS.SPEED_ADD = parseFloat(m[2]);
        }
        if ((m = /distance\s*=\s*([\d.]+)\s*\+\s*Math\.random\(\)\s*\*\s*([\d.]+)/.exec(text))) {
          PARAMS.ORBIT_MIN = Math.max(24, parseFloat(m[1]) * 0.28); PARAMS.ORBIT_ADD = parseFloat(m[2]) * 0.28;
        }
        if ((m = /d\s*<\s*([\d]+)/.exec(text))) {
          PARAMS.CONN_DIST = Math.round(parseFloat(m[1]) * 0.32);
        }
        if ((m = /lineWidth\s*=\s*([\d.]+)/.exec(text))) {
          PARAMS.LINE_W = parseFloat(m[1]);
        }
        if ((m = /[\"'](#[a-fA-F0-9]{6})[\"']/.exec(text))) {
          PARAMS.COLOR = m[1];
        }
      }

      function init() {
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        canvas.width = w * (window.devicePixelRatio || 1);
        canvas.height = h * (window.devicePixelRatio || 1);
        ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);

        var cx = w / 2, cy = h / 2;
        for (var i = 0; i < PARAMS.COUNT; i++) {
          var a = (Math.PI * 2 / PARAMS.COUNT) * i;
          particles.push({
            bx: cx + Math.cos(a) * (PARAMS.ORBIT_MIN + Math.random() * PARAMS.ORBIT_ADD),
            by: cy + Math.sin(a) * (PARAMS.ORBIT_MIN + Math.random() * PARAMS.ORBIT_ADD),
            x: 0, y: 0,
            size: PARAMS.SIZE_MIN + Math.random() * (PARAMS.SIZE_MAX - PARAMS.SIZE_MIN),
            a: a,
            sp: PARAMS.SPEED_MIN + Math.random() * PARAMS.SPEED_ADD
          });
        }
        for (var j = 0; j < particles.length; j++) {
          particles[j].x = particles[j].bx;
          particles[j].y = particles[j].by;
        }
        animate();
      }

      function animate() {
        var w = canvas.offsetWidth, h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.a += p.sp;
          p.x += (p.bx + Math.cos(p.a) * 4 - p.x) * 0.12;
          p.y += (p.by + Math.sin(p.a) * 4 - p.y) * 0.12;
        }

        for (var i = 0; i < particles.length; i++) {
          for (var j = i + 1; j < particles.length; j++) {
            var dx = particles[i].x - particles[j].x;
            var dy = particles[i].y - particles[j].y;
            var d = Math.sqrt(dx * dx + dy * dy);
            if (d < PARAMS.CONN_DIST) {
              ctx.lineWidth = PARAMS.LINE_W;
              ctx.strokeStyle = 'rgba(255,45,45,' + (1 - d / PARAMS.CONN_DIST).toFixed(3) + ')';
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        for (var k = 0; k < particles.length; k++) {
          var pp = particles[k];
          ctx.fillStyle = PARAMS.COLOR;
          ctx.shadowBlur = 3;
          ctx.shadowColor = PARAMS.COLOR;
          ctx.beginPath();
          ctx.arc(pp.x, pp.y, pp.size, 0, Math.PI * 2);
          ctx.fill();
        }

        requestAnimationFrame(animate);
      }

      fetch('https://project-skyscraper.com/neural-network-status/')
        .then(function (r) { return r.text(); })
        .then(function (t) { applyLiveParams(t); })
        .catch(function () {})
        .finally(function () { init(); });
    })();
  </script>
</body>
</html>
