<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT SKYSCRAPER | OPS CENTRE</title>
  <link rel="icon" type="image/jpeg" href="favicon.jpg">
  <link rel="stylesheet" href="status/style.css">
</head>
<body class="landing">
  <main class="landing-centre">
    <img src="favicon.jpg" alt="PS" class="landing-avatar">
    <h1>PROJECT SKYSCRAPER</h1>
    <p class="tagline">SITE MONITORING &amp; OPS CENTRE</p>
    <div class="terminal-prompt">
      <span class="prompt-sym">&#9654;</span>
      <input type="text" id="opInput" class="terminal-input" placeholder="Awaiting External Operator ghost line..." maxlength="48" autocomplete="off" spellcheck="false">
      <span class="cursor">&#9612;</span>
    </div>

    <nav class="landing-nav">
      <a href="status/" class="btn">EXEC SITE STATUS &amp; CHANGES</a>
    </nav>
    
    <footer class="landing-footer">
      <span class="blink">&#9612; LIVE &#9612;</span>
    </footer>
  </main>
  <script>
    const inp = document.getElementById('opInput');
    const saved = localStorage.getItem('operator');
    if (saved) inp.value = saved;
    const save = () => { const v = inp.value.trim(); localStorage.setItem('operator', v || ''); };
    inp.addEventListener('blur', save);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { save(); inp.blur(); } });
  </script>
</body>
</html>
